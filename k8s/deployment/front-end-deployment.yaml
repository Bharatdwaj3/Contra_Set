apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: front-end
  name: front-end
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: front-end
  template:
    metadata:
      labels:
        io.kompose.network/lrn-k86-default: "true"
        io.kompose.service: front-end
    spec:
      containers:
        - image: ecommerce-frontend:latest
          imagePullPolicy: Never
          name: front-end
          ports:
            - containerPort: 80
              protocol: TCP
          resources: {}
      restartPolicy: Always
