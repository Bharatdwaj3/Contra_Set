apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f observability-compose.yml -o k8s/observability/
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: promtail
  name: promtail
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: promtail
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f observability-compose.yml -o k8s/observability/
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/e-commerce-web-application-default: "true"
        io.kompose.service: promtail
    spec:
      containers:
        - args:
            - -config.file=/etc/promtail/config.yml
          image: grafana/promtail:latest
          name: ecommerce-promtail
          ports:
            - containerPort: 8180
              hostPort: 8180
              protocol: TCP
          resources: {}
          volumeMounts:
            - mountPath: /etc/promtail/config.yml
              name: promtail-claim0
            - mountPath: /var/lib/docker/containers
              name: promtail-claim1
              readOnly: true
            - mountPath: /var/run/docker.sock
              name: promtail-claim2
      restartPolicy: Always
      volumes:
        - name: promtail-claim0
          persistentVolumeClaim:
            claimName: promtail-claim0
        - name: promtail-claim1
          persistentVolumeClaim:
            claimName: promtail-claim1
            readOnly: true
        - name: promtail-claim2
          persistentVolumeClaim:
            claimName: promtail-claim2
status: {}
